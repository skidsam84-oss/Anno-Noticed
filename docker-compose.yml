version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: annopow_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-annopow_db}
      POSTGRES_USER: ${POSTGRES_USER:-annopow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-annopow_password}
    volumes:
      - annopow_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - annopow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-annopow_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: annopow_bot
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-annopow_user}:${POSTGRES_PASSWORD:-annopow_password}@postgres:5432/${POSTGRES_DB:-annopow_db}
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - ENABLE_AI=${ENABLE_AI:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app
      - ./logs:/app/logs
    command: python -m app.main
    restart: unless-stopped
    networks:
      - annopow_network
    ports:
      - "8000:8000"

networks:
  annopow_network:
    driver: bridge

volumes:
  annopow_postgres_data:
